<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="96" height="96" rx="20" fill="#1B5E30"/>
  <!-- Gradient overlay -->
  <rect width="96" height="96" rx="20" fill="url(#grad)"/>

  <!-- Truck: total width ~52, height ~28, centered at 48,48 -->
  <g transform="translate(22, 32)" stroke="white" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Cab body -->
    <rect x="0" y="0" width="30" height="22" rx="2"/>
    <!-- Cargo box -->
    <path d="M30 6 L30 22 L52 22 L52 12 L44 6 Z"/>
    <!-- Front wheel -->
    <circle cx="9" cy="26" r="6" fill="#1B5E30" stroke="white" stroke-width="3.8"/>
    <!-- Rear wheel -->
    <circle cx="42" cy="26" r="6" fill="#1B5E30" stroke="white" stroke-width="3.8"/>
    <!-- Window -->
    <rect x="4" y="4" width="12" height="8" rx="1.5" fill="white" fill-opacity="0.3" stroke="none"/>
  </g>
</svg>